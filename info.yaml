yaml_version: 1

project:
  title:        "8-bit Counter Tapeout"
  author:       "kavya"
  description:  "8-bit counter with counter value setup"
  language:     "Verilog"
  top_module:   "tt_um_kvsh2050_counter"
  source_files:
    - project.v
  tiles:        "1x1"
  clock_hz:     10000000

pinout:
  ui:
    - "count_start: load preset value when high, count up when low"
    - "unused"
    - "unused"
    - "unused"
    - "unused"
    - "unused"
    - "unused"
    - "unused"
  uo:
    - "counter bit 0 (LSB)"
    - "counter bit 1"
    - "counter bit 2"
    - "counter bit 3"
    - "counter bit 4"
    - "counter bit 5"
    - "counter bit 6"
    - "counter bit 7 (MSB)"
  uio:
    - "count_in bit 0 (LSB) - preset load value"
    - "count_in bit 1"
    - "count_in bit 2"
    - "count_in bit 3"
    - "count_in bit 4"
    - "count_in bit 5"
    - "count_in bit 6"
    - "count_in bit 7 (MSB) - preset load value"